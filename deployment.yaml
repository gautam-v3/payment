apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-v1
  template:
    metadata:
      labels:
        app: notif-v1
    spec:
      containers:
      - name: notif
        image: gautamv0305/notification-app:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notif-service-v1
spec:
  type: NodePort
  selector:
    app: notif-v1
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30001